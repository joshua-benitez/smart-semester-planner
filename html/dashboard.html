<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CourseFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #0b0d12;
      --s1:    #0f1116;
      --s2:    #13151c;
      --line:  rgba(255,255,255,0.055);
      --line2: rgba(255,255,255,0.09);
      --t1:    #e6eaf6;
      --t2:    rgba(230,234,246,0.5);
      --t3:    rgba(230,234,246,0.28);
      --chm:   #2dd4a0;
      --mat:   #5ba3f5;
      --csc:   #9d7ef0;
      --red:   #f87171;
      --amb:   #f59e0b;
      --grn:   #4ade80;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
    }

    /* ── Layout ───────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-columns: 48px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Rail ─────────────────────────────────────── */
    .rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 0;
      gap: 2px;
      border-right: 1px solid var(--line);
      background: var(--bg);
    }

    .rail-mark {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--t1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .rail-mark svg { width: 13px; height: 13px; color: var(--bg); }

    .ri {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      border: none;
      background: transparent;
    }
    .ri:hover { background: var(--s2); color: var(--t2); }
    .ri.on { background: var(--s2); color: var(--t1); }
    .ri svg { width: 15px; height: 15px; }
    .ri.bottom { margin-top: auto; }

    /* ── Main ─────────────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
      background: var(--bg);
    }

    /* ── Page header ─────────────────────────────── */
    .ph {
      padding: 24px 28px 0;
      flex-shrink: 0;
    }

    .ph-row1 {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .ph-title {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--t1);
      line-height: 1;
    }

    .ph-actions {
      display: flex;
      gap: 7px;
      margin-top: 1px;
    }

    .btn {
      font-family: inherit;
      font-size: 0.77rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.1s;
      border: 1px solid var(--line2);
      background: transparent;
      color: var(--t2);
    }
    .btn:hover { background: var(--s2); color: var(--t1); }
    .btn.solid { background: var(--t1); color: var(--bg); border-color: transparent; font-weight: 600; }
    .btn.solid:hover { background: #ccd2e8; }

    /* Smart summary */
    .ph-summary {
      font-size: 0.82rem;
      color: var(--t3);
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .ph-summary .hot  { color: var(--red); font-weight: 500; }
    .ph-summary .warn { color: var(--amb); font-weight: 500; }
    .ph-summary .hint { color: var(--t2); }

    /* ── Tab bar ─────────────────────────────────── */
    .tabs {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 0 28px;
    }

    .tab {
      font-family: inherit;
      font-size: 0.79rem;
      font-weight: 500;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--t3);
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    .tab:hover { color: var(--t2); }
    .tab.on { color: var(--t1); border-bottom-color: rgba(230,234,246,0.4); }
    .tab.on.chm { color: var(--chm); border-bottom-color: var(--chm); }
    .tab.on.mat { color: var(--mat); border-bottom-color: var(--mat); }
    .tab.on.csc { color: var(--csc); border-bottom-color: var(--csc); }

    .tab-sep { width: 1px; height: 14px; background: var(--line2); margin: 0 2px; }

    .tabs-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .done-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--t3);
      cursor: pointer;
      user-select: none;
      padding: 8px 0;
    }
    .done-toggle input { cursor: pointer; accent-color: var(--grn); }

    /* ── Scroll area ─────────────────────────────── */
    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 28px 48px;
    }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--s2); border-radius: 2px; }

    /* ── Section ─────────────────────────────────── */
    .section { padding-top: 20px; }

    .slabel {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
      margin-bottom: 4px;
    }
    .sname {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--t3);
    }
    .sname.ov { color: var(--red); }
    .sname.td { color: var(--red); }
    .sname.wk { color: var(--amb); }

    .scount {
      font-family: 'Geist Mono', monospace;
      font-size: 0.63rem;
      color: var(--t3);
    }

    /* ── Row ─────────────────────────────────────── */
    .row {
      display: grid;
      grid-template-columns: 1fr 88px 28px;
      align-items: center;
      gap: 10px;
      padding: 7px 8px 7px 10px;
      border-radius: 6px;
      transition: background 0.08s;
      cursor: default;
    }
    .row:hover { background: var(--s2); }
    .row.done { opacity: 0.28; }
    .row.done .rtitle { text-decoration: line-through; }

    /* Info */
    .rinfo { min-width: 0; }
    .rtitle {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--t1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .rmeta {
      font-size: 0.7rem;
      color: var(--t3);
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .rc { font-weight: 600; }
    .rc-chm { color: var(--chm); }
    .rc-mat { color: var(--mat); }
    .rc-csc { color: var(--csc); }

    /* Due — the information hero */
    .rdue {
      text-align: right;
      white-space: nowrap;
    }
    .rdue-state {
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .ds-ov  { color: var(--red); }
    .ds-td  { color: var(--red); }
    .ds-s   { color: var(--amb); }
    .ds-n   { color: var(--t3); font-weight: 400; }

    .rdue-date {
      font-family: 'Geist Mono', monospace;
      font-size: 0.62rem;
      color: var(--t3);
      margin-top: 1px;
    }

    /* Done btn */
    .dbtn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--line2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      color: transparent;
      justify-self: center;
    }
    .dbtn:hover { border-color: var(--grn); color: var(--grn); background: rgba(74,222,128,0.07); }
    .dbtn.on { border-color: var(--grn); color: var(--grn); background: rgba(74,222,128,0.09); }
    .dbtn svg { width: 10px; height: 10px; }

    .empty {
      padding: 40px 0;
      text-align: center;
      font-size: 0.85rem;
      color: var(--t3);
    }

    @media (max-width: 560px) {
      .shell { grid-template-columns: 1fr; }
      .rail  { display: none; }
      .ph, .tabs, .scroll { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>

// Restore saved
const saved = JSON.parse(sessionStorage.getItem('cf5') || '[]');
saved.forEach(id => { const a = DATA.find(x => x.id === id); if (a) a.done = true; });

function days(due) { return Math.ceil((new Date(due) - TODAY) / 86400000); }

function grp(a) {
  if (a.done) return 'done';
  const d = days(a.due);
  if (d < 0)   return 'ov';
  if (d === 0) return 'td';
  if (d <= 7)  return 'wk';
  if (d <= 14) return 'nx';
  return 'lt';
}

function dueInfo(due) {
  const d = days(due);
  const ds = new Date(due).toLocaleDateString('en-US', { month:'short', day:'numeric' });
  if (d < 0)   return { s:`${Math.abs(d)}d overdue`, cls:'ds-ov', date:ds };
  if (d === 0) return { s:'Due today',  cls:'ds-td', date:'' };
  if (d === 1) return { s:'Tomorrow',   cls:'ds-s',  date:ds };
  if (d <= 7)  return { s:`${d}d left`, cls:'ds-s',  date:ds };
  return         { s:ds,               cls:'ds-n',  date:'' };
}

function cc(c) {
  return c === 'CHM-151' ? 'rc-chm' : c === 'MAT-272' ? 'rc-mat' : 'rc-csc';
}

function smartSummary(pool) {
  const overdue = pool.filter(a => !a.done && days(a.due) < 0);
  const thisWk  = pool.filter(a => !a.done && days(a.due) >= 0 && days(a.due) <= 7);

  if (overdue.length === 0 && thisWk.length === 0) {
    return 'All clear — nothing due in the next 7 days.';
  }

  let parts = [];

  if (overdue.length > 0) {
    const first = overdue.sort((a,b) => new Date(a.due)-new Date(b.due))[0];
    parts.push(`<span class="hot">${overdue.length} overdue.</span> Start with <span class="hint">${first.c} ${first.t.split('—')[0].trim()}</span>.`);
  }

  if (thisWk.length > 0) {
    const soonest = thisWk.sort((a,b) => new Date(a.due)-new Date(b.due))[0];
    const d = days(soonest.due);
    const when = d === 0 ? 'today' : d === 1 ? 'tomorrow' : `in ${d}d`;
    parts.push(`<span class="warn">${thisWk.length} due this week</span> — next up: <span class="hint">${soonest.c} ${soonest.t.split('—')[0].trim()}</span> ${when}.`);
  }

  return parts.join(' ');
}

const SECS = [
  { k:'ov', n:'Overdue',   lc:'ov' },
  { k:'td', n:'Today',     lc:'td' },
  { k:'wk', n:'This week', lc:'wk' },
  { k:'nx', n:'Next week', lc:''   },
  { k:'lt', n:'Upcoming',  lc:''   },
  { k:'done', n:'Completed', lc:'' },
];

function render() {
  const course   = document.querySelector('.tab.on')?.dataset.course || 'all';
  const showDone = document.getElementById('show-done').checked;
  const pool     = course === 'all' ? DATA : DATA.filter(a => a.c === course);

  document.getElementById('summary').innerHTML = smartSummary(pool);

  const list = document.getElementById('list');
  list.innerHTML = '';
  let any = false;

  SECS.forEach(s => {
    if (s.k === 'done' && !showDone) return;
    const items = pool.filter(a => grp(a) === s.k).sort((a,b) => new Date(a.due)-new Date(b.due));
    if (!items.length) return;
    any = true;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="slabel"><span class="sname ${s.lc}">${s.n}</span><span class="scount">${items.length}</span></div>`;

    items.forEach(a => {
      const di = dueInfo(a.due);
      const row = document.createElement('div');
      row.className = `row${a.done?' done':''}`;
      row.innerHTML = `
        <div class="rinfo">
          <div class="rtitle">${a.t}</div>
          <div class="rmeta"><span class="rc ${cc(a.c)}">${a.c}</span><span>·</span><span>${a.type}</span></div>
        </div>
        <div class="rdue">
          <div class="rdue-state ${di.cls}">${di.s}</div>
          ${di.date?`<div class="rdue-date">${di.date}</div>`:''}
        </div>
        <button class="dbtn${a.done?' on':''}" data-id="${a.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      `;
      sec.appendChild(row);
    });

    list.appendChild(sec);
  });

  if (!any) list.innerHTML = '<div class="empty">Nothing here.</div>';
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.dbtn');
  if (btn) {
    const a = DATA.find(x => x.id === +btn.dataset.id);
    if (!a) return;
    a.done = !a.done;
    sessionStorage.setItem('cf5', JSON.stringify(DATA.filter(x=>x.done).map(x=>x.id)));
    render(); return;
  }
  const tab = e.target.closest('.tab[data-course]');
  if (tab) {
    document.querySelectorAll('.tab[data-course]').forEach(t => t.classList.remove('on'));
    tab.classList.add('on');
    render();
  }
});

document.getElementById('show-done').addEventListener('change', render);
render();
</script>
</body>
</html>
